<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Claude Tag · 03 핵심 기능</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="../../styles.css" />
</head>
<body>
  <section class="card" aria-label="핵심 기능">
    <span class="pageno">03</span>
    <span class="arrow left" aria-hidden="true">‹</span>
    <span class="arrow right" aria-hidden="true">›</span>
    <div class="body-head">
      <div class="eyebrow">Key features</div>
      <h2 class="headline"><span class="or">@Claude</span>는<br />멀티플레이어</h2>
    </div>
    <div class="feat-list">
      <div class="feat c-blue">
        <span class="num">01</span>
        <div class="txt">
          <h3>능동적인 지원</h3>
          <p>주변 맥락을 인지해 <span class="hl">알아야 할 내용을 먼저</span> 알려줍니다.</p>
        </div>
      </div>
      <div class="feat c-purple">
        <span class="num">02</span>
        <div class="txt">
          <h3>비동기 작업</h3>
          <p>맡겨두면 <span class="hl">혼자 처리</span>하고, 긴 기간에 걸쳐 스스로 일정도 잡습니다.</p>
        </div>
      </div>
      <div class="feat c-pink">
        <span class="num">03</span>
        <div class="txt">
          <h3>다이렉트 메시지</h3>
          <p>개인용 도구를 사용해 <span class="hl">1:1로 직접</span> 답변합니다.</p>
        </div>
      </div>
    </div>
    <div class="banner">팀 대화에 끊김 없이 합류</div>
    <div class="dots" aria-hidden="true">
      <i></i><i></i><i class="on"></i><i></i><i></i><i></i>
    </div>
  </section>
</body>
</html>
